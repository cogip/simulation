name: Build Documentation using MkDocs
on:
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-24.04
    steps:
      - name: Install Debian dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -qq libegl1

      - name: Git checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python
        run: uv python install

      - name: Create .venv
        run: uv venv

      - name: Patch Python install
        run: |
          source .venv/bin/activate
          uv pip install "git+https://github.com/bluss/sysconfigpatcher"
          sysconfigpatcher $(dirname $(dirname $(readlink $(which python))))
          uv pip uninstall sysconfigpatcher

      - name: Install the packages
        run: |
          source .venv/bin/activate
          uv sync --all-extras --dev

      - name: Build doc
        run: |
          source .venv/bin/activate
          mkdocs build

      - name: Minimize uv cache
        run: uv cache prune --ci
