x-build-console: &build-console
  build:
    context: .
    target: cogip-console

x-build-gui: &build-gui
  build:
    context: .
    target: cogip-gui

x-build-firmware: &build-firmware
  build:
    context: .
    target: cogip-firmware

x-env-common: &env-common
  COGIP_SERVER_HOST: beacon
  COGIP_SERVER_PORT: 8080
  COGIP_SERVER_URL: http://beacon:8080

x-vol-cogip: &vol-cogip
  "./cogip:/src/cogip"

x-vol-run: &vol-run
  "run:/var/run/cogip"

x-vol-pts: &vol-pts
  "/dev/pts:/dev/pts"

x-vol-vscode: &vol-vscode
  "vscode:/root/.vscode-server"

x-volumes-common: &volumes-common
  volumes:
    - *vol-cogip
    - *vol-run
    - *vol-pts
    - *vol-vscode

x-socat: &socat
  <<: *build-console
  volumes:
    - *vol-run
    - *vol-pts
  command:
    - /bin/sh
    - -x
    - -c
    - |
      socat -d -d pty,raw,echo=0,link=/var/run/cogip/ptySTM32-$${ROBOT_ID} pty,raw,echo=0,link=/var/run/cogip/ptyRPI-$${ROBOT_ID} &
      sleep infinity

x-firmware: &firmware
  <<: *build-firmware
  environment: &env-firmware
    FIRMWARE_APP: ${FIRMWARE_APP:-app_test}
    FIRMWARE_BOARD: ${FIRMWARE_BOARD:-cogip-native}
  stdin_open: true
  tty: true
  working_dir: /mcu-firmware
  volumes:
    - *vol-run
    - *vol-pts
    - *vol-vscode
    - "./submodules/RIOT:/RIOT"
    - "./submodules/mcu-firmware:/mcu-firmware"
  command:
    - /bin/sh
    - -x
    - -c
    - |
      make -C applications/$${FIRMWARE_APP} BOARD=$${FIRMWARE_BOARD} PORT="-c /tmp -c /var/run/cogip/ptySTM32-$${ROBOT_ID}" term
  depends_on: &depends-firmware
      make-firmware:
        condition: service_completed_successfully

x-robot: &robot
  <<: [*build-console, *volumes-common]
  hostname: robot1
  environment: &env-robot
    << : *env-common
    COPILOT_RELOAD: ${COPILOT_RELOAD:-0}
    COPILOT_DEBUG: ${COPILOT_DEBUG:-0}
    DETECTOR_RELOAD: ${DETECTOR_RELOAD:-0}
    DETECTOR_DEBUG: ${DETECTOR_DEBUG:-0}
    DETECTOR_UART_PORT: ${DETECTOR_UART_PORT:-}
    DETECTOR_UART_SPEED: ${DETECTOR_UART_SPEED:-230400}
    DETECTOR_MIN_DISTANCE: ${DETECTOR_MIN_DISTANCE:-150}
    DETECTOR_MAX_DISTANCE: ${DETECTOR_MAX_DISTANCE:-2500}
    DETECTOR_BEACON_RADIUS: ${DETECTOR_BEACON_RADIUS:-35}
    DETECTOR_REFRESH_INTERVAL: ${DETECTOR_REFRESH_INTERVAL:-0.2}
    DETECTOR_EMULATION: 1
  command:
    - /bin/sh
    - -x
    - -c
    - |
      wait-for-it -t 0 $${COGIP_SERVER_HOST}:$${COGIP_SERVER_PORT}
      cogip-copilot --serial-port /var/run/cogip/ptyRPI-$${ROBOT_ID} &
      cogip-detector &
      sleep infinity
  depends_on:
    - beacon

services:
  beacon:
    <<: *build-console
    hostname: beacon
    ports:
      - "8080:8080"
    environment:
      << : *env-common
      ROBOT_ID: 0
      SERVER_DEBUG: ${SERVER_DEBUG:-0}
      SERVER_RELOAD: ${SERVER_RELOAD:-0}
      PLANNER_DEBUG: ${PLANNER_DEBUG:-0}
      PLANNER_RELOAD: ${PLANNER_RELOAD:-0}
      PLANNER_ROBOT_WIDTH: ${PLANNER_ROBOT_WIDTH:-225}
      PLANNER_OBSTACLE_RADIUS: ${PLANNER_OBSTACLE_RADIUS:-150}
      PLANNER_OBSTACLE_BB_MARGIN: ${PLANNER_OBSTACLE_BB_MARGIN:-0.2}
      PLANNER_OBSTACLE_BB_VERTICES: ${PLANNER_OBSTACLE_BB_VERTICES:-6}
      PLANNER_OBSTACLE_SENDER_INTERVAL: ${PLANNER_OBSTACLE_SENDER_INTERVAL:-0.2}
      PLANNER_PATH_REFRESH_INTERVAL: ${PLANNER_PATH_REFRESH_INTERVAL:-0.2}
    volumes:
      - *vol-cogip
      - *vol-vscode
      - "./records:/var/tmp/cogip"
    command:
      - /bin/sh
      - -x
      - -c
      - |
        cogip-server &
        cogip-planner &
        sleep infinity

  monitor:
    << : *build-gui
    hostname: monitor
    environment:
      << : *env-common
      DISPLAY: ${DISPLAY:-:0}
      QTWEBENGINE_DISABLE_SANDBOX: 1
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-}
    command:
      - /bin/sh
      - -x
      - -c
      - |
        wait-for-it -t 0 $${COGIP_SERVER_HOST}:$${COGIP_SERVER_PORT}
        cogip-monitor &
        sleep infinity
    working_dir: /src
    depends_on:
      - beacon
    volumes:
      - *vol-cogip
      - *vol-vscode
      - "./assets:/src/assets"
      - "/tmp/.X11-unix/:/tmp/.X11-unix/"
      - "/dev/dri/:/dev/dri/"
      - "$XDG_RUNTIME_DIR:$XDG_RUNTIME_DIR"
    profiles:
      - monitor

  socat1:
    << : *socat
    hostname: socat1
    environment:
      ROBOT_ID: 1
    profiles:
      - robot1

  socat2:
    << : *socat
    hostname: socat2
    environment:
      ROBOT_ID: 2
    profiles:
      - robot2

  make-firmware:
    <<: *build-firmware
    environment:
      << : *env-firmware
    working_dir: /mcu-firmware
    volumes:
      - "./submodules/RIOT:/RIOT"
      - "./submodules/mcu-firmware:/mcu-firmware"
    command:
      - /bin/sh
      - -x
      - -c
      - |
        make -C applications/$${FIRMWARE_APP} -j$$(nproc) BOARD=$${FIRMWARE_BOARD}

  firmware1:
    << : *firmware
    hostname: firmware1
    environment:
      << : *env-firmware
      ROBOT_ID: 1
    depends_on:
      << : *depends-firmware
      socat1:
        condition: service_started
    profiles:
      - robot1

  firmware2:
    << : *firmware
    hostname: firmware2
    environment:
      << : *env-firmware
      ROBOT_ID: 2
    depends_on:
      << : *depends-firmware
      socat2:
        condition: service_started
    profiles:
      - robot2

  robot1:
    << : *robot
    hostname: robot1
    environment:
      << : *env-robot
      ROBOT_ID: 1
    depends_on:
      - socat1
      - beacon
    profiles:
      - robot1

  robot2:
    << : *robot
    hostname: robot2
    environment:
      << : *env-robot
      ROBOT_ID: 2
    depends_on:
      - socat2
      - beacon
    profiles:
      - robot2

volumes:
  vscode:
  run:
